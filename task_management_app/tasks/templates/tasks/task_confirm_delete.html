{% extends 'tasks/base.html' %}

{% block content %}
<div class="confirm-card">
    <h2>🗑️ Delete Task</h2>
    <p>Are you sure you want to delete <strong>"{{ task.title }}"</strong>?<br>This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">Yes, Delete</button>
        <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
