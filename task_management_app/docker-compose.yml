services:

  db:
    image: postgres:16
    container_name: task_manager_db
    restart: always
    environment:
      POSTGRES_DB: task_manager_db
      POSTGRES_USER: task_manager_user
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_manager_user -d task_manager_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: task_manager_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=task_manager_db
      - DB_USER=task_manager_user
      - DB_PASSWORD=yourpassword
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: