version: '3.9'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: task_manager_db
      POSTGRES_USER: task_manager_user
      POSTGRES_PASSWORD: 2006
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: ./task_management_app
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             gunicorn task_management_app.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./task_management_app:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DJANGO_SETTINGS_MODULE=task_management_app.settings

volumes:
  postgres_data: